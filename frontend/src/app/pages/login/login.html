<div class="page-shell">
  <div class="card-box">
    <h2 class="mb-3">Employee Login</h2>
    <p class="text-muted">Use your account to manage employees.</p>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-grid gap-3">
      <div>
        <label class="form-label">Email</label>
        <input class="form-control" type="email" formControlName="email" />
      </div>

      <div>
        <label class="form-label">Password</label>
        <input class="form-control" type="password" formControlName="password" />
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="mt-3 mb-0">No account? <a routerLink="/signup">Create one</a></p>
  </div>
</div>
