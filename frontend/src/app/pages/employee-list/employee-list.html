<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Employees List</h2>
    <div class="d-flex gap-2">
      <a class="btn btn-primary" routerLink="/employees/add">Add Employee</a>
      <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="alert alert-info">Loading employees...</div>

  <div class="card shadow-sm" *ngIf="!loading">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Picture</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Designation</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let employee of employees">
            <td>
              <img *ngIf="employee.profilePicture" [src]="employee.profilePicture" width="48" height="48" style="object-fit:cover;border-radius:50%;" />
            </td>
            <td>{{ employee.firstName }}</td>
            <td>{{ employee.lastName }}</td>
            <td>{{ employee.email }}</td>
            <td>{{ employee.designation || '-' }}</td>
            <td class="d-flex gap-2 flex-wrap">
              <a class="btn btn-sm btn-info text-white" [routerLink]="['/employees/view', employee.id]">View</a>
              <a class="btn btn-sm btn-warning" [routerLink]="['/employees/edit', employee.id]">Edit</a>
              <button class="btn btn-sm btn-danger" (click)="deleteEmployee(employee.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="employees.length === 0">
            <td colspan="6" class="text-center py-4">No employees found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
